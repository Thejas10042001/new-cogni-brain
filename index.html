
<!DOCTYPE html>
<html lang="en" class="dark" style="color-scheme: dark;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SPIKEDAI | Cognitive Intelligence</title>
    <script>
      // Force dark mode class on html element immediately
      document.documentElement.classList.add('dark');
      
      // Shim process.env for the browser environment to prevent crashes
      window.process = window.process || { env: { API_KEY: '' } };
      
      // Tailwind Configuration
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- PDF.js for PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Mammoth.js for DOCX parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --scrollbar-width: 6px;
        --scrollbar-track: transparent;
        --scrollbar-thumb: rgba(0, 0, 0, 0.1);
        --scrollbar-thumb-hover: rgba(0, 0, 0, 0.2);
        --accent-primary: #4f46e5;
        --accent-secondary: #06b6d4;
        --bg-main: #f8fafc;
        --bg-sidebar: #ffffff;
        --glass-bg: rgba(255, 255, 255, 0.7);
        --glass-border: rgba(0, 0, 0, 0.1);
      }

      html.dark {
        --scrollbar-thumb: rgba(255, 255, 255, 0.1);
        --scrollbar-thumb-hover: rgba(255, 255, 255, 0.2);
        --bg-main: #0f172a;
        --bg-sidebar: #1e293b;
        --glass-bg: rgba(15, 23, 42, 0.7);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        scrollbar-gutter: stable;
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        image-rendering: -webkit-optimize-contrast;
        background-color: var(--bg-main);
        color: #1e293b;
      }

      html.dark body {
        color: #f1f5f9;
      }

      /* Premium Glassmorphism */
      .glass {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--glass-border);
      }

      .glass-dark {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Animated Background */
      .bg-mesh {
        background-color: var(--bg-main);
        background-image: 
          radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(6, 182, 212, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.05) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(168, 85, 247, 0.05) 0px, transparent 50%);
      }

      /* Mac-style Minimal Scrollbars */
      ::-webkit-scrollbar {
        width: var(--scrollbar-width);
        height: var(--scrollbar-width);
      }

      ::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 20px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--scrollbar-thumb-hover);
      }

      /* Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 20px; }
      html.dark .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

      /* Safari Backdrop Blur Fix */
      .glass-effect {
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      /* Mac Focus Ring */
      :focus-visible {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }

      /* Prevent selection on buttons */
      button {
        user-select: none;
        -webkit-user-select: none;
      }

      /* Markdown Content Styling */
      .markdown-content {
        word-break: break-word;
      }
      .markdown-content h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 1.5rem; color: var(--accent-primary); text-transform: uppercase; letter-spacing: -0.02em; }
      .markdown-content h2 { font-size: 2rem; font-weight: 800; margin-top: 2rem; margin-bottom: 1rem; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 0.5rem; }
      .dark .markdown-content h2 { color: #f1f5f9; border-bottom-color: #1e293b; }
      .markdown-content h3 { font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; }
      .markdown-content p { margin-bottom: 1.25rem; }
      .markdown-content ul { list-style-type: disc; padding-left: 2rem; margin-bottom: 1.5rem; }
      .markdown-content ol { list-style-type: decimal; padding-left: 2rem; margin-bottom: 1.5rem; }
      .markdown-content li { margin-bottom: 0.5rem; }
      .markdown-content strong { font-weight: 800; color: #4f46e5; }
      .dark .markdown-content strong { color: #818cf8; }
      .markdown-content blockquote { border-left: 4px solid #4f46e5; padding-left: 1.5rem; font-style: italic; color: #64748b; margin: 1.5rem 0; background: rgba(79, 70, 229, 0.05); padding-top: 1rem; padding-bottom: 1rem; border-radius: 0 1rem 1rem 0; }
      .dark .markdown-content blockquote { border-left-color: #818cf8; color: #94a3b8; background: rgba(129, 140, 248, 0.05); }
      .markdown-content code { background: #f1f5f9; padding: 0.2rem 0.4rem; rounded: 0.4rem; font-family: monospace; font-size: 0.9em; }
      .dark .markdown-content code { background: #1e293b; color: #e2e8f0; }
      .markdown-content pre { background: #0f172a; color: #f8fafc; padding: 1.5rem; border-radius: 1.5rem; overflow-x: auto; margin: 1.5rem 0; font-size: 0.85em; }
      .markdown-content table { width: 100%; border-collapse: separate; border-spacing: 0; margin-bottom: 2rem; font-size: 0.85em; border: 1px solid #e2e8f0; border-radius: 1rem; overflow: hidden; }
      .dark .markdown-content table { border-color: #334155; }
      .markdown-content th { background: #f8fafc; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 1rem; text-align: left; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #475569; }
      .dark .markdown-content th { background: #1e293b; border-color: #334155; color: #94a3b8; }
      .markdown-content td { border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 1rem; color: #475569; }
      .dark .markdown-content td { border-color: #334155; color: #cbd5e1; }
      .markdown-content tr:last-child td { border-bottom: none; }
      .markdown-content th:last-child, .markdown-content td:last-child { border-right: none; }
      .markdown-content tr:nth-child(even) td { background: rgba(0,0,0,0.02); }
      .dark .markdown-content tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",

    "firebase/app": "https://esm.sh/firebase@^12.9.0/app",
    "firebase/firestore": "https://esm.sh/firebase@^12.9.0/firestore",

  }
}
</script>
  </head>

    <div id="root"></div>
    <script>
      // Initialize PDF.js worker
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
    </script>
    <!-- Explicitly load the entry point module to mount the React app -->
    <script type="module" src="/index.tsx"></script>

</html>
